<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="sytle.css">
    <title>OLUWA JUNI</title>
</head>
<body>

  <header>
    <h1>OLUWA JUNIOR SCHOOL -MULOGORO - Contact Us</h1>
  </header>

  <div class="contact-container">
    <div class="contact-info">
      <h2>Get in Touch</h2>
      <p><strong>Address:</strong> Plot 123, School Road, Kampala, Uganda</p>
      <p><strong>Phone:</strong> +256 706 997 385</p>
      <p><strong>Email:</strong> info@oluwajunior.ac.ug</p>
    </div>

    <form action="mailto:info@oluwajunior.ac.ug" method="post" enctype="text/plain">
      <input type="text" name="name" placeholder="Your Full Name" required>
      <input type="email" name="email" placeholder="Your Email Address" required>
      <textarea name="message" rows="6" placeholder="Your Message" required></textarea>
      <button type="submit">Send Message</button>
    </form>
  </div>

  <footer>
    <p>&copy; 2026 oluwa junior school. All Rights Reserved.</p>
  </footer>

    
</body>
</html>
